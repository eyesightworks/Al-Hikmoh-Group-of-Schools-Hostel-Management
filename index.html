<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Al Hikmoh Hostel
</title>

<link rel="stylesheet"
href="style.css">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage"
class="login-page">

  <img src="image.png"
  class="logo">

  <h2>
  Al Hikmoh Hostel Login
  </h2>

  <input
  type="password"
  id="password"
  placeholder="Enter Password">

  <button onclick="login()">
  Login
  </button>

</div>

<!-- MAIN APP -->
<div id="app"
style="display:none;">

  <!-- TOPBAR -->
  <div class="topbar">

    <button
    class="menu-btn"
    onclick="toggleMenu()">

    ☰

    </button>

    <h3>
    Al Hikmoh Hostel
    </h3>

  </div>

  <!-- MENU -->
  <div id="menu"
  class="menu">

    <p onclick="showSection('students')">
    Students
    </p>

    <p onclick="showSection('suggestion')">
    Suggestion Box
    </p>

    <p onclick="logout()">
    Logout
    </p>

  </div>

  <!-- STUDENT SECTION -->
  <div id="students"
  class="section">

    <input
    type="text"
    id="search"
    placeholder="Search Student..."
    onkeyup="filterStudents()">

    <select id="student"></select>

    <input
    type="number"
    id="academic"
    placeholder="Academic (/10)">

    <input
    type="number"
    id="character"
    placeholder="Character (/10)">

    <input
    type="number"
    id="respect"
    placeholder="Respect (/10)">

    <textarea
    id="remark"
    placeholder="Remark"></textarea>

    <input
    type="file"
    id="imageInput"
    accept="image/png,image/jpeg">

    <button
    onclick="generateStudentPDF()">

    Generate Student PDF

    </button>

    <button
    onclick="sendStudentWhatsApp()">

    Send PDF to WhatsApp

    </button>

    <!-- PDF AREA -->
    <div id="studentPDF"
    class="pdf-area">

      <img
      id="previewImage"
      src="image.png">

      <h2 id="pdfStudentName">
      Student Name
      </h2>

      <p id="pdfAcademic"></p>

      <p id="pdfCharacter"></p>

      <p id="pdfRespect"></p>

      <p id="pdfRemark"></p>

    </div>

  </div>

  <!-- SUGGESTION -->
  <div id="suggestion"
  class="section"
  style="display:none;">

    <h3>
    Suggestion Box
    </h3>

    <textarea
    id="suggestText"
    placeholder="Write suggestion here..."></textarea>

    <button
    onclick="generateSuggestionPDF()">

    Generate Suggestion PDF

    </button>

    <button
    onclick="sendSuggestionWhatsApp()">

    Send Suggestion PDF

    </button>

    <!-- PDF -->
    <div id="suggestionPDF"
    class="pdf-area">

      <h2>
      Suggestion Report
      </h2>

      <p id="suggestionPreview"></p>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
