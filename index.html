<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Hikmoh Hostel</title>

<link rel="stylesheet" href="style.css">

<!-- PDF LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Hostel Login</h2>
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <!-- TOPBAR -->
  <div class="topbar">
    <button onclick="toggleMenu()">☰</button>
    <h3>Al Hikmoh Group of Schools</h3>
  </div>

  <!-- MENU -->
  <div id="menu" class="menu">
    <p onclick="showSection('students')">Students</p>
    <p onclick="showSection('suggestion')">Suggestion Box</p>
    <p onclick="logout()">Logout</p>
  </div>

  <!-- STUDENTS -->
  <div id="students" class="section">

    <input type="text" id="search" placeholder="Search student..." onkeyup="filterStudents()">

    <select id="student"></select>

    <input type="number" id="academic" placeholder="Academic (/10)">
    <input type="number" id="character" placeholder="Character (/10)">
    <input type="number" id="respect" placeholder="Respect (/10)">
    <textarea id="remark" placeholder="Remark"></textarea>

    <input type="file" id="image">

    <button onclick="saveData()">Save Student Record</button>
    <button onclick="sendWhatsApp()">Send PDF to WhatsApp</button>

    <div id="recordList"></div>
  </div>

  <!-- SUGGESTION -->
  <div id="suggestion" class="section" style="display:none;">

    <h3>Suggestion Box</h3>

    <textarea id="suggestText" placeholder="Write suggestion..."></textarea>

    <button onclick="saveSuggestion()">Save Suggestion</button>
    <button onclick="sendSuggestionPDF()">Send Suggestion PDF</button>

    <div id="suggestList"></div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
