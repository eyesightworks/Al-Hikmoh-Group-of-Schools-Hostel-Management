<!-- STUDENT REPORT -->

<div id="studentReport"
class="section">

<h2>
Student Report
</h2>

<input
type="text"
id="searchStudent"
placeholder="Search Student..."
onkeyup="filterStudents()">

<select id="studentSelect"></select>

<!-- TERM -->

<select id="term">

<option>First Term</option>

<option>Second Term</option>

<option>Third Term</option>

</select>

<!-- STUDENT PHOTO -->

<input
type="file"
id="studentImage"
accept="image/*">

<!-- SUBJECTS -->

<h3>
Academic Subjects
</h3>

<div id="subjectContainer">

</div>

<!-- CHARACTER RECORD -->

<h3>
Character Assessment
</h3>

<input
type="number"
id="character"
placeholder="Character (0 - 100)"
min="0"
max="100">

<input
type="number"
id="respect"
placeholder="Respect (0 - 100)"
min="0"
max="100">

<input
type="number"
id="discipline"
placeholder="Discipline (0 - 100)"
min="0"
max="100">

<input
type="number"
id="neatness"
placeholder="Neatness (0 - 100)"
min="0"
max="100">

<input
type="number"
id="punctuality"
placeholder="Punctuality (0 - 100)"
min="0"
max="100">

<!-- AUTO RESULTS -->

<div class="pdf-card">

<h3>
Performance Summary
</h3>

<p>
Academic Average:
<span id="academicAverage">
0%
</span>
</p>

<p>
Character Average:
<span id="characterAverage">
0%
</span>
</p>

<p>
Overall Percentage:
<span id="overallPercentage">
0%
</span>
</p>

<p>
Grade:
<span id="grade">
F
</span>
</p>

</div>

<textarea
id="remark"
placeholder="Hostel Master Comment"></textarea>

<button onclick="generateStudentReportPDF()">
Generate Student Report PDF
</button>

<button onclick="sendStudentReportWhatsApp()">
Send To WhatsApp
</button>

<!-- PDF PREVIEW -->

<div
id="studentReportPDF"
class="pdf-card">

<img
id="reportPreviewImage"
src="image.png">

<h3 id="reportPreviewName">

Student Name

</h3>

<p id="reportPreviewClass">

Class

</p>

<p id="reportPreviewTerm">

Term

</p>

<div id="reportPreviewSubjects">

</div>

<p id="reportPreviewAcademicAverage">

Academic Average

</p>

<p id="reportPreviewCharacterAverage">

Character Average

</p>

<p id="reportPreviewOverall">

Overall Percentage

</p>

<p id="reportPreviewGrade">

Grade

</p>

<p id="reportPreviewRemark">

Remark

</p>

<p id="reportPreviewDate">

Date

</p>

</div>

</div>
